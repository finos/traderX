# NGINX location snippet for NATS websocket proxying (state 010 conceptual delta)

location /nats-ws {
    proxy_pass http://nats-broker:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
}

# Existing ingress routes for /, /account-service, /position-service, /trade-service,
# /reference-data, /people-service remain unchanged from state 003.

location /price-publisher/ {
    proxy_pass http://price-publisher:18100/;
    proxy_http_version 1.1;
}
