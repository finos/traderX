version: 1
baseline:
  id: base-00-traditional
  label: "Traditional to Cloud-Native Baseline (pre-Docker)"
  specs:
    - foundation/00-traditional-to-cloud-native/specs/00-system-context.md
    - foundation/00-traditional-to-cloud-native/specs/01-functional-requirements-baseline.md
    - foundation/00-traditional-to-cloud-native/specs/02-nfr-baseline.md
    - foundation/00-traditional-to-cloud-native/specs/03-current-system-moving-parts.md
    - foundation/00-traditional-to-cloud-native/specs/04-interface-contracts-baseline.md

tracks:
  devex:
    rule: "No new functional requirements. Apply NFR and operability overlays."
    steps:
      - id: devex-01-foundation
        from: base-00-traditional
        spec: tracks/devex/steps/01-foundation/spec.md
      - id: devex-02-docker-compose
        from: devex-01-foundation
        spec: tracks/devex/steps/02-docker-compose/spec.md
      - id: devex-03-tilt-dev
        from: devex-02-docker-compose
        spec: tracks/devex/steps/03-tilt-dev/spec.md
      - id: devex-04-kubernetes
        from: devex-03-tilt-dev
        spec: tracks/devex/steps/04-kubernetes/spec.md
      - id: devex-04-radius
        from: devex-03-tilt-dev
        spec: tracks/devex/steps/04-radius/spec.md
      - id: devex-05-gitops
        from: devex-04-kubernetes|devex-04-radius
        spec: tracks/devex/steps/05-gitops/spec.md

  nonfunctional:
    rule: "No new functional requirements. Add security, observability, reliability overlays."
    steps:
      - id: nf-01-basic-auth
        from: base-00-traditional
        spec: tracks/nonfunctional/steps/01-basic-auth/spec.md
      - id: nf-02-oauth2
        from: nf-01-basic-auth
        spec: tracks/nonfunctional/steps/02-oauth2/spec.md
      - id: nf-02-zero-trust
        from: nf-01-basic-auth
        spec: tracks/nonfunctional/steps/02-zero-trust/spec.md
      - id: nf-03-observability
        from: nf-02-oauth2|nf-02-zero-trust
        spec: tracks/nonfunctional/steps/03-observability/spec.md
      - id: nf-04-redis-caching
        from: nf-03-observability
        spec: tracks/nonfunctional/steps/04-redis-caching/spec.md
      - id: nf-04-distributed-caching
        from: nf-03-observability
        spec: tracks/nonfunctional/steps/04-distributed-caching/spec.md
      - id: nf-05-postgres-ha
        from: nf-04-redis-caching|nf-04-distributed-caching
        spec: tracks/nonfunctional/steps/05-postgres-ha/spec.md
      - id: nf-05-circuit-breakers
        from: nf-04-redis-caching|nf-04-distributed-caching
        spec: tracks/nonfunctional/steps/05-circuit-breakers/spec.md

  functional:
    rule: "May introduce additive functional requirements with compatibility guarantees."
    steps:
      - id: func-01-common-data-model
        from: base-00-traditional
        spec: tracks/functional/steps/01-common-data-model/spec.md
      - id: func-02-real-time-pricing
        from: func-01-common-data-model
        spec: tracks/functional/steps/02-real-time-pricing/spec.md
      - id: func-03-advanced-orders
        from: func-02-real-time-pricing
        spec: tracks/functional/steps/03-advanced-orders/spec.md
      - id: func-03-portfolio-analytics
        from: func-02-real-time-pricing
        spec: tracks/functional/steps/03-portfolio-analytics/spec.md
      - id: func-04-angular-modern
        from: func-03-advanced-orders|func-03-portfolio-analytics
        spec: tracks/functional/steps/04-angular-modern/spec.md
      - id: func-04-micro-frontends
        from: func-03-advanced-orders|func-03-portfolio-analytics
        spec: tracks/functional/steps/04-micro-frontends/spec.md
      - id: func-05-event-driven
        from: func-04-angular-modern|func-04-micro-frontends
        spec: tracks/functional/steps/05-event-driven/spec.md
