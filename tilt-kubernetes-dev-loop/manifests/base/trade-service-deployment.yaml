apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-service
  namespace: traderx
  labels:
    app: trade-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-service
  template:
    metadata:
      labels:
        app: trade-service
    spec:
      containers:
        - name: trade-service
          image: traderx/trade-service:state009
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18092
              protocol: TCP
          env:
            - name: TRADING_SERVICE_PORT
              value: "18092"
            - name: ACCOUNT_SERVICE_HOST
              value: "account-service"
            - name: REFERENCE_DATA_HOST
              value: "reference-data"
            - name: PEOPLE_SERVICE_HOST
              value: "people-service"
            - name: NATS_BROKER_HOST
              value: "nats-broker"
            - name: PRICE_SERVICE_HOST
              value: "price-publisher"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:8080"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,info"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
