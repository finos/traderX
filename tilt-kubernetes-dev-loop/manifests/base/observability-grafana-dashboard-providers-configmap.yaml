apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-grafana-dashboard-providers
  namespace: traderx
data:
  dashboards.yaml: |
    apiVersion: 1
    
    providers:
      - name: TraderX Dashboards
        orgId: 1
        folder: TraderX
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
