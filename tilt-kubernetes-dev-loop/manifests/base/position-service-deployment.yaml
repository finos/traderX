apiVersion: apps/v1
kind: Deployment
metadata:
  name: position-service
  namespace: traderx
  labels:
    app: position-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: position-service
  template:
    metadata:
      labels:
        app: position-service
    spec:
      containers:
        - name: position-service
          image: traderx/position-service:state009
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18090
              protocol: TCP
          env:
            - name: POSITION_SERVICE_PORT
              value: "18090"
            - name: DATABASE_PG_HOST
              value: "database"
            - name: DATABASE_PG_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "traderx"
            - name: DATABASE_DBUSER
              value: "traderx"
            - name: DATABASE_DBPASS
              value: "traderx"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:8080"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,info"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
