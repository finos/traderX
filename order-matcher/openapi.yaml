openapi: 3.1.0
info:
  title: TraderX Order Matcher API
  version: 0.1.0
paths:
  /orders:
    get:
      summary: List orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
          required: false
        - in: query
          name: accountId
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: OK
    post:
      summary: Create order
      responses:
        "201":
          description: Created
  /orders/{orderId}:
    get:
      summary: Get order
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not found
  /orders/{orderId}/cancel:
    post:
      summary: Cancel order
      responses:
        "200":
          description: OK
  /orders/{orderId}/force-fill:
    post:
      summary: Force fill order
      responses:
        "200":
          description: OK
