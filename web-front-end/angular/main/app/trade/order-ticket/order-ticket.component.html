<div class="p-4">
    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Account</label>
        <div class="col-sm-8">
            <input readonly disabled class="form-control" id="orderAccountLabel" [value]="account?.displayName" />
        </div>
    </div>
    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Security</label>
        <div class="col-sm-8">
            <input
                id="order-stock-input"
                [minLength]="1"
                [(ngModel)]="selectedCompany"
                [typeahead]="filteredStocks"
                typeaheadOptionField="matchLabel"
                (typeaheadOnSelect)="onSelect($event)"
                (blur)="onBlur()"
                placeholder="Search security"
                autocomplete="off"
                autocapitalize="off"
                autocorrect="off"
                spellcheck="false"
                class="form-control"
            />
        </div>
    </div>

    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Live Price</label>
        <div class="col-sm-8 d-flex align-items-center">
            <ng-container *ngIf="ticket.security; else noSecuritySelected">
                <span class="fw-semibold">{{ formatLivePrice() }}</span>
                <small *ngIf="selectedPriceAsOf" class="text-muted ms-2">as of {{ formatAsOf() }}</small>
            </ng-container>
            <ng-template #noSecuritySelected>
                <span class="text-muted">Select a security</span>
            </ng-template>
        </div>
    </div>

    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Side</label>
        <div class="col-sm-8">
            <div class="btn-group">
                <input type="radio" class="btn-check" name="orderSideButton" value="Buy" id="orderBuyButton" [(ngModel)]="ticket.side" checked #orderBuyButton />
                <label class="btn" [ngClass]="orderBuyButton.checked ? 'btn-info btn-sm' : 'btn-secondary btn-sm'" for="orderBuyButton">Buy</label>
                <input type="radio" class="btn-check" name="orderSideButton" value="Sell" id="orderSellButton" [(ngModel)]="ticket.side" #orderSellButton />
                <label class="btn" [ngClass]="orderSellButton.checked ? 'btn-warning btn-sm' : 'btn-secondary btn-sm'" for="orderSellButton">Sell</label>
            </div>
        </div>
    </div>

    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Quantity</label>
        <div class="col-sm-8">
            <input class="form-control d-inline-block" id="orderQuantityField" type="number" [(ngModel)]="ticket.quantity" />
        </div>
    </div>

    <div class="mb-3 row">
        <label class="col-sm-2 col-form-label me-3">Strike Price</label>
        <div class="col-sm-8">
            <input class="form-control d-inline-block" id="orderStrikeField" type="number" step="0.001" [(ngModel)]="ticket.limitPrice" />
        </div>
    </div>

    <div class="mb-3 row">
        <button class="btn btn-sm btn-primary col-sm-3 me-2" id="createOrderButton" (click)="onCreate()">Create Order</button>
        <button class="btn btn-sm btn-secondary col-sm-3" id="cancelOrderButton" (click)="onCancel()">Close</button>
    </div>
</div>
