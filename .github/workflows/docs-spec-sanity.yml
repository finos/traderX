name: Docs and Spec Sanity

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  docs-spec-sanity:
    runs-on: ubuntu-latest
    env:
      SPECKIT_FEATURE_ID: 001-baseline-uncontainerized-parity
      SPECIFY_FEATURE: 001-baseline-uncontainerized-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shell dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install website dependencies
        run: npm --prefix website ci --no-audit --no-fund

      - name: Validate root Spec Kit gates
        run: bash pipeline/speckit/validate-root-spec-kit-gates.sh

      - name: Validate Spec Kit readiness
        run: bash pipeline/speckit/validate-speckit-readiness.sh

      - name: Validate Spec Kit expressiveness
        run: bash pipeline/speckit/verify-spec-expressiveness.sh

      - name: Validate aggregate coverage
        run: bash pipeline/verify-spec-coverage.sh

      - name: Build docs (includes on-demand API docs generation)
        run: npm --prefix website run build

      - name: Run AFDocs scorecard on local built site
        run: |
          python3 -m http.server 3000 --directory website/build >/tmp/traderx-docs-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}' EXIT
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 1
          done
          set +e
          npx --yes afdocs check http://127.0.0.1:3000 --format scorecard
          SCORE_EXIT=$?
          npx --yes afdocs check http://127.0.0.1:3000 --format json --score > afdocs-score-local.json
          JSON_EXIT=$?
          set -e
          if [ ! -s afdocs-score-local.json ]; then
            echo '{"status":"error","message":"AFDocs JSON score output missing"}' > afdocs-score-local.json
          fi
          if [ "$SCORE_EXIT" -ne 0 ] || [ "$JSON_EXIT" -ne 0 ]; then
            echo "[warn] AFDocs check reported findings (non-blocking in this workflow)."
          fi

      - name: Upload AFDocs local score artifact
        uses: actions/upload-artifact@v4
        with:
          name: afdocs-local-score
          path: afdocs-score-local.json
          if-no-files-found: warn
